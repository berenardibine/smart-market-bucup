<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Market — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #FFF7ED 0%, #FFFFFF 50%, #FFF1E6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 32px -8px rgba(249, 115, 22, 0.4);
    }
    .icon-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #F97316, #EA580C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .wifi-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #F97316, #EA580C);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px -6px rgba(249, 115, 22, 0.4);
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px -6px rgba(249, 115, 22, 0.5);
    }
    .retry-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <img src="/icons/icon-192x192.png" alt="Smart Market" />
    </div>
    <div class="wifi-icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — Smart Market will be back as soon as you're online!</p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
  </div>
</body>
</html>
